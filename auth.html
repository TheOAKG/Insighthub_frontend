<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightHub : Join the community</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">InsightHub</div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="auth.html">Login/Register</a>
        </div>

    </nav>

    <section class="auth-wrapper">
        <div class="cards">
            <h3>Student Registration</h3>
            <form id="register-form">
                <input type="text" id="reg-username" placeholder="Username" required >
                <input type="email" id="reg-email" placeholder="Email Address" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <select id="reg-dept">
                    <option value="">Select Department</option>
                    <option value="IT">Information Technology</option>
                    <option value="CS">Computer Science</option>
                    <option value="Ing"> Engineering</option>

                </select>
                <button type="submit">Create Account</button>

            </form>

        </div>

        <div class="cards">
            <h3>Sign In</h3>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>

            </form>

        </div>


    </section>

      <footer>
        <div class="footer-container">
            <div class="footer-section">
                <h4>InsightHub</h4>
            </div>
            
            <div class="footer-section">
                <h4>Quick Links</h4>
                <a href="index.html">Home</a>
                <a href="auth.html">Login/Register</a>
                <a href="submit.html">Submit Project</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Use</a>
            </div>
            
            <div class="footer-section">
                <h4>Contact Support</h4>
                <p>Email: research@InsightHub.com</p>
                <p>Phone: +233 30 933 4567</p>
                <p>Location: Aburi,Ghana</p>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2026 InsightHub. All rights reserved.</p>
        </div>
    </footer>


    <script src="script.js"></script>
    
</body>
</html>
